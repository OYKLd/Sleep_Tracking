<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi de Sommeil</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">Suivi de Sommeil</h1>
            <p class="subtitle">Enregistez vos nuits pour mieux dormir</p>
        </header>

        <main class="main">
            <!-- Carte de statistiques -->
            <section class="stats-card">
                <h2>Vos Statistiques</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="avgSleep">0h 00min</div>
                        <div class="stat-label">Moyenne de sommeil</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalNights">0</div>
                        <div class="stat-label">Nuits enregistrées</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="lastNight">-</div>
                        <div class="stat-label">Dernière nuit</div>
                    </div>
                </div>
            </section>

            <!-- Formulaire d'ajout -->
            <section class="form-card">
                <h2>Ajouter une nuit</h2>
                <form id="sleepForm" class="sleep-form">
                    <div class="form-group">
                        <label for="bedtime">Heure de coucher</label>
                        <input type="time" id="bedtime" name="bedtime" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="waketime">Heure de réveil</label>
                        <input type="time" id="waketime" name="waketime" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                    
                    <button type="submit" class="btn-primary">
                        Enregistrer cette nuit
                    </button>
                </form>
            </section>

            <!-- Historique -->
            <section class="history-card">
                <h2>Historique des nuits</h2>
                <div id="historyList" class="history-list">
                    <p class="empty-message">Aucune nuit enregistrée pour le moment.</p>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
